---
# ServiceAccount with IRSA annotation — the pod uses this to call AWS APIs
# (EC2 Describe*, EKS Describe*, CloudWatch) without storing credentials.
# Replace <ACCOUNT_ID> and <REGION> with your values.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-agent
  namespace: devops-agent
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/devops-agent-irsa
---
# ClusterRole: read-only access to everything the triage tools need.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: devops-agent-viewer
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - nodes
      - services
      - endpoints
      - events
      - namespaces
      - configmaps
      - persistentvolumeclaims
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - pods
      - nodes
    verbs: ["get", "list"]
  - apiGroups: ["helm.sh"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devops-agent-viewer
subjects:
  - kind: ServiceAccount
    name: devops-agent
    namespace: devops-agent
roleRef:
  kind: ClusterRole
  name: devops-agent-viewer
  apiGroup: rbac.authorization.k8s.io
---
# Separate Role for pods/exec — scoped to the devops-agent namespace only.
# Only needed if DEVOPS_AGENT_ALLOW_EXEC=true (service triage: redis-cli, kafka).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: devops-agent-exec
  namespace: devops-agent
rules:
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devops-agent-exec
  namespace: devops-agent
subjects:
  - kind: ServiceAccount
    name: devops-agent
    namespace: devops-agent
roleRef:
  kind: Role
  name: devops-agent-exec
  apiGroup: rbac.authorization.k8s.io
