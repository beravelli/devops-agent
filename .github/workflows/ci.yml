name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev --extra server --extra github

      - name: Lint
        run: uv run ruff check src tests

      - name: Test
        run: uv run pytest -q --tb=short
        env:
          DEVOPS_AGENT_LLM_PROVIDER: github
          # The secret is only needed for tests that actually invoke the LLM;
          # offline tests (safety, copilot, prometheus, etc.) run without it.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t devops-agent:${{ github.sha }} .
